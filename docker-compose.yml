services:
  postgres:
    image: postgres:16-alpine
    container_name: leomadzhbot-postgres
    environment:
      POSTGRES_DB: leomadzhbot
      POSTGRES_USER: leomadzhbot
      POSTGRES_PASSWORD: leomadzhbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leomadzhbot -d leomadzhbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  profile-service:
    build:
      context: ./services/profile_service
    container_name: leomadzhbot-profile-service
    environment:
      DATABASE_URL: postgresql+asyncpg://leomadzhbot:leomadzhbot@postgres:5432/leomadzhbot
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  bot-gateway:
    build:
      context: ./services/bot_gateway
    container_name: leomadzhbot-bot-gateway
    environment:
      PROFILE_SERVICE_BASE_URL: http://profile-service:8000
    depends_on:
      - profile-service

volumes:
  pgdata:
